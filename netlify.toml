# ============================================
# PADMAJA HOME FOODS — Netlify Configuration
# Optimized for static site hosting + Supabase-ready
# ============================================

[build]
  # Publish directory is root (all HTML/JS/CSS at top level)
  publish = "."

# ============================================
# CACHE HEADERS
# Strategy: HTML always fresh, static assets cached, JSON never cached
# ============================================

# HTML files — always revalidate (SEO-critical, content may change)
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Root HTML (index.html) — same as above
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# products.json — NEVER cached (admin updates, Supabase transition ready)
[[headers]]
  for = "*.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    # Prevent any CDN caching of JSON data
    Netlify-CDN-Cache-Control = "public, max-age=0, must-revalidate"

# CSS files — cache for 1 year (immutable content, hash in filename not needed)
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS files — cache for 1 year (immutable content)
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — cache for 1 year (immutable content)
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Favicon files — cache for 1 year
[[headers]]
  for = "*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Web manifest — cache for 1 year
[[headers]]
  for = "*.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================
# SECURITY HEADERS (applied to all responses)
# ============================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Content-Security-Policy is intentionally NOT set here
    # because inline scripts (Google Analytics, inline JS) would break.
    # Add a nonce-based CSP when you move to Supabase backend.

# ============================================
# REDIRECTS
# Minimal — only what's actually needed
# ============================================

# Force trailing slash consistency (optional, Netlify Pretty URLs handles this)
# No SPA fallback needed — each page is a real HTML file

# Redirect old GitHub Pages URLs to new Netlify domain (SEO preservation)
[[redirects]]
  from = "https://padmajahomefoods.github.io/*"
  to = "https://padmajahomefoods.netlify.app/:splat"
  status = 301
  force = true
